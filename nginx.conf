server {
    listen 8080;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /py-api/ {
        proxy_pass https://learnstocks-api-144972782524.us-central1.run.app/;
        proxy_ssl_server_name on;
        proxy_set_header Host learnstocks-api-144972782524.us-central1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /advisor-api/ {
        proxy_pass https://learnstocks-chatbot-144972782524.us-central1.run.app/;
        proxy_ssl_server_name on;
        proxy_set_header Host learnstocks-chatbot-144972782524.us-central1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
